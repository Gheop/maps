<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Gheop Maps</title>
  <meta name="description" content="Carte web ultra-légère : tuiles OpenStreetMap, recherche, itinéraires. Fonctionne hors-ligne.">
  <meta name="theme-color" content="#efe9dc">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Maps">
  <link rel="preconnect" href="https://tile.openstreetmap.org" crossorigin>
  <link rel="preconnect" href="https://tiles.stadiamaps.com" crossorigin>
  <link rel="preconnect" href="https://server.arcgisonline.com" crossorigin>
  <link rel="preconnect" href="https://tile.opentopomap.org" crossorigin>
  <link rel="stylesheet" href="/default.css">
</head>
<body>
  <div id="viewbox"><div id="map"></div></div>

  <div id="controls">
    <div id="search-box" class="collapsed">
      <input id="s" type="search" placeholder="Rechercher un lieu…" autocomplete="off">
      <button id="bs" type="button" title="Rechercher"></button>
      <button id="route-toggle" type="button" title="Itinéraire"></button>
    </div>
    <div id="route-row" hidden>
      <input id="arr" type="search" placeholder="Arrivée" autocomplete="off">
      <button id="swap" type="button" title="Inverser départ / arrivée">⇅</button>
    </div>
    <div id="route-out"></div>
  </div>

  <div id="layers">
    <button id="layers-current" class="layer-btn" type="button">
      <span class="name" id="layers-current-name">Plan</span>
      <span class="thumb" id="layers-current-thumb" data-layer="plan"></span>
    </button>
    <div id="layers-list" hidden>
      <button class="layer-btn" type="button" data-layer="plan"><span class="name">Plan</span><span class="thumb" data-layer="plan"></span></button>
      <button class="layer-btn" type="button" data-layer="sat"><span class="name">Satellite</span><span class="thumb" data-layer="sat"></span></button>
      <button class="layer-btn" type="button" data-layer="relief"><span class="name">Relief</span><span class="thumb" data-layer="relief"></span></button>
      <button class="layer-btn" type="button" data-layer="toner"><span class="name">Toner</span><span class="thumb" data-layer="toner"></span></button>
      <button class="layer-btn" type="button" data-layer="aquarelle"><span class="name">Aquarelle</span><span class="thumb" data-layer="aquarelle"></span></button>
    </div>
  </div>

  <div id="zoombar" title="Niveau de zoom"></div>
  <button id="geo-btn" type="button" title="Ma position" aria-label="Ma position">
    <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor" aria-hidden="true"><path d="M12 8a4 4 0 100 8 4 4 0 000-8zm8.94 3A8.994 8.994 0 0013 3.06V1h-2v2.06A8.994 8.994 0 003.06 11H1v2h2.06A8.994 8.994 0 0011 20.94V23h2v-2.06A8.994 8.994 0 0020.94 13H23v-2h-2.06zM12 19a7 7 0 110-14 7 7 0 010 14z"/></svg>
  </button>
  <button id="share-btn" type="button" title="Partager ce lieu" aria-label="Partager ce lieu">
    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor" aria-hidden="true"><path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/></svg>
  </button>
  <div id="toast" role="status" aria-live="polite"></div>
  <div id="ladder"></div>
  <div id="attribution"></div>
  <div id="lmap" title="Vue d'ensemble (cliquer pour recentrer)"><div id="mask_lmap"></div></div>

  <script type="module" src="/js/main.js"></script>
</body>
</html>
